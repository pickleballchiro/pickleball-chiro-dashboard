<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoulder Pain Workshop — QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      color: #111;
    }

    .card {
      text-align: center;
      border: 2px solid #9B8B60;
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9B8B60;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #111;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 28px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    #qrcode canvas, #qrcode img {
      border: 8px solid white;
      box-shadow: 0 0 0 1px #e0e0e0;
      border-radius: 4px;
    }

    .url-label {
      font-size: 12px;
      color: #888;
      word-break: break-all;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .cta {
      font-size: 16px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }

    .powered {
      font-size: 11px;
      color: #aaa;
      margin-top: 20px;
    }

    .print-btn {
      display: inline-block;
      margin-top: 28px;
      background: #9B8B60;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      cursor: pointer;
    }

    @media print {
      .print-btn { display: none; }
      body { padding: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="eyebrow">Insight Chiropractic</p>
    <h1>Shoulder Pain Workshop</h1>
    <p class="subtitle">Scan to reserve your spot</p>

    <div id="qrcode"></div>

    <p class="url-label" id="urlDisplay"></p>

    <p class="cta">Free — Limited Spots</p>

    <button class="print-btn" onclick="window.print()">Print QR Code</button>

    <p class="powered">Powered by Insight Chiropractic</p>
  </div>

  <script>
    const WORKSHOP_URL = 'https://insightchiro.github.io/workshops/shoulder-pain/';

    document.getElementById('urlDisplay').textContent = WORKSHOP_URL;

    new QRCode(document.getElementById('qrcode'), {
      text: WORKSHOP_URL,
      width: 280,
      height: 280,
      colorDark: '#111111',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
