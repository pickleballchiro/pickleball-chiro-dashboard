name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Insight Chiropractic/**'
      - 'PickleballChiro Quiz/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir _site
          cp -r "Insight Chiropractic/." _site/
          mkdir _site/quiz
          cp -r "PickleballChiro Quiz/." _site/quiz/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
