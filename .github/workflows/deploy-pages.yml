name: Deploy to GitHub Pages

on:
  # Auto-deploy disabled 2026-07-12. This repo no longer contains the pages this
  # workflow deployed: the quiz was replaced by a redirect and archived, the Insight
  # workshop moved to insightchiro.github.io, and the main site lives in the separate
  # pickleballchiro-site repo (pickleballchiro.co). Left as manual-only so it stops
  # failing on every push; re-enable the push trigger if those folders ever return.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build combined site
        run: |
          mkdir -p _site/quiz
          cp -r 'Insight Chiropractic/.' _site/
          cp -r 'PickleballChiro Quiz/.' _site/quiz/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
